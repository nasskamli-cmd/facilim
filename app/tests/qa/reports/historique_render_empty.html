</style></head><body class="p-6">
<h1 class="text-sm text-gray-400 mb-3">Harness historique — historique vide (données réelles GET /historique, aucun recalcul)</h1>
<div class="max-w-2xl">
<div id="panel-historique" class="hidden mt-4">
        <div class="border border-facilim-100 rounded-xl overflow-hidden">
          <div class="bg-facilim-50 px-5 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-facilim-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h4 class="font-semibold text-facilim-900 text-sm">Historique du dossier</h4>
            </div>
            <span id="historique-count" class="text-xs font-semibold px-2.5 py-1 rounded-full bg-gray-100 text-gray-600">–</span>
          </div>
          <div class="px-5 py-4">
            <div id="historique-timeline" class="space-y-3"></div>
          </div>
        </div>
      </div>
</div>
<script>
function renderHistorique(data) {
  const panel = document.getElementById('panel-historique');
  if (!panel) return;
  panel.classList.remove('hidden');   // panneau affiché (message explicite si vide)

  const evs = (data && Array.isArray(data.evenements)) ? data.evenements : [];
  const esc = s => (s == null ? '' : String(s)).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

  const cnt = document.getElementById('historique-count');
  if (cnt) cnt.textContent = `${evs.length} événement${evs.length > 1 ? 's' : ''}`;

  const tl = document.getElementById('historique-timeline');
  if (!tl) return;

  if (!evs.length) {
    tl.innerHTML = '<div class="text-xs text-gray-400 italic">Aucun événement enregistré pour ce dossier.</div>';
    return;
  }

  const fmtDate = d => {
    if (!d) return '—';
    try { const x = new Date(d); return isNaN(x.getTime()) ? String(d) : x.toLocaleString('fr-FR'); }
    catch (e) { return String(d); }
  };
  const fmtDetails = det => {
    if (!det || typeof det !== 'object') return '';
    return Object.entries(det)
      .filter(([k, v]) => v !== '' && v !== null && v !== undefined)
      .map(([k, v]) => `<div><span class="text-gray-400">${esc(k)} :</span> <span class="text-gray-700">${esc(typeof v === 'object' ? JSON.stringify(v) : v)}</span></div>`)
      .join('');
  };

  tl.innerHTML = evs.map(e => `
    <div class="border-l-2 border-facilim-400 pl-3 py-1">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-[11px] text-gray-400">${fmtDate(e.date)}</span>
        <span class="text-xs font-semibold text-gray-800">${esc(e.type || 'événement')}</span>
        ${e.source ? `<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-gray-100 text-gray-500">${esc(e.source)}</span>` : ''}
        ${e.acteur ? `<span class="text-[10px] text-gray-400">par ${esc(e.acteur)}</span>` : ''}
      </div>
      <div class="text-xs mt-0.5 space-y-0.5">${fmtDetails(e.details)}</div>
    </div>
  `).join('');
}
const data = {"dossier_id": "QAP5_VIDE", "nb_evenements": 0, "evenements": []};
renderHistorique(data);
</script></body></html>
